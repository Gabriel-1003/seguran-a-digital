<!-- Altere a seção das opções de checkbox para ter valores padrão mais seguros -->
<div class="option">
    <input type="checkbox" id="uppercase" checked>
    <label for="uppercase">Letras Maiúsculas (A-Z)</label>
</div>
<div class="option">
    <input type="checkbox" id="lowercase" checked>  <!-- agora marcado -->
    <label for="lowercase">Letras Minúsculas (a-z)</label>
</div>
<div class="option">
    <input type="checkbox" id="numbers" checked>    <!-- agora marcado -->
    <label for="numbers">Números (0-9)</label>
</div>
<div class="option">
    <input type="checkbox" id="symbols">
    <label for="symbols">Símbolos (!@#$%^&*)</label>
</div>
<div class="option">
    <input type="checkbox" id="exclude-similar">
    <label for="exclude-similar">Excluir caracteres similares (1,l,I,0,O,etc)</label>
</div>
